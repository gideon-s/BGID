<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGID</title>
<script src="/static/vendor/rot.min.js"></script>
<style>
  /* Palette + type lifted from the Black Goat splash: near-black warm gradient,
     gold accents, parchment ink, classical serif. */
  :root{--bg:#0a0908;--panel:#15110a;--fg:#e9e2cf;--dim:#9a8f74;--accent:#c7a24a;
        --gold-dim:#8a7536;--edge:#2c2516;
        --green:#8fae5e;--red:#c1554a;--blue:#b08a3c;--magenta:#b48a6a;
        --serif:"Trajan Pro",Georgia,"Times New Roman",serif;
        --mono:ui-monospace,SFMono-Regular,Menlo,monospace;}
  *{box-sizing:border-box}
  body{margin:0;color:var(--fg);font:15px/1.5 var(--mono);height:100vh;display:flex;flex-direction:column;
       background:radial-gradient(circle at 50% 30%, #17130c 0%, #0a0908 62%, #050403 100%);}
  header{padding:.5rem 1rem;background:var(--panel);border-bottom:1px solid var(--edge);display:flex;justify-content:space-between;align-items:center}
  header b{color:var(--accent);letter-spacing:.28em;font-family:var(--serif);font-weight:600}
  #who{color:var(--dim);font-size:.85rem}
  #who a{color:var(--dim);cursor:pointer;margin-left:.75rem;text-decoration:underline}
  #who a:hover{color:var(--accent)}
  main{flex:1;display:flex;min-height:0}
  /* Left: tile map (top) + combat/stats/actions strip (bottom) */
  #world{flex:1;display:flex;flex-direction:column;min-width:0}
  /* The map: ink-and-gold lines on aged dark vellum, framed like a chart. */
  #map{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;
       background:radial-gradient(circle at 50% 45%, #14100a 0%, #0d0a06 75%, #080603 100%);}
  #map canvas{image-rendering:auto;box-shadow:0 0 0 1px var(--edge),0 0 30px rgba(199,162,74,.06);border-radius:2px}
  #under{height:34%;min-height:140px;display:flex;border-top:1px solid var(--edge);background:var(--panel)}
  #combat{flex:1;overflow-y:auto;padding:.6rem .8rem;display:flex;flex-direction:column;gap:.1rem;font-size:.85rem}
  #panel{width:230px;border-left:1px solid var(--edge);padding:.6rem .8rem;overflow-y:auto}
  #panel h2{font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;color:var(--gold-dim);margin:.6rem 0 .35rem;font-family:var(--serif)}
  #panel h2:first-child{margin-top:0}
  #zone{color:var(--accent);font-size:1.05rem;margin:0 0 .3rem;font-family:var(--serif);letter-spacing:.12em}
  .hpbar{height:.7rem;background:#1a1610;border:1px solid var(--edge);border-radius:4px;overflow:hidden;margin:.1rem 0 .3rem}
  .hpbar > i{display:block;height:100%;background:linear-gradient(90deg,#6f8a48,var(--green))}
  .hptext{color:var(--dim);font-size:.8rem}
  .ent{display:flex;align-items:center;gap:.35rem;margin:.2rem 0;font-size:.85rem}
  .ent .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ent button{background:rgba(199,162,74,.05);border:1px solid var(--gold-dim);color:var(--fg);border-radius:3px;cursor:pointer;font-size:.72rem;padding:.1rem .4rem}
  .ent button:hover{border-color:var(--accent);color:var(--accent)}
  /* Right: Layer-2 dialogue / emotes */
  #side{width:300px;background:var(--panel);border-left:1px solid var(--edge);padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.15rem}
  #side h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.18em;color:var(--gold-dim);margin:0 0 .5rem;font-family:var(--serif)}
  footer{padding:.5rem 1rem;background:var(--panel);border-top:1px solid var(--edge)}
  #cmd{width:100%;background:#0a0806;border:1px solid var(--gold-dim);color:var(--fg);
       padding:.5rem .75rem;border-radius:3px;font:inherit;outline:none}
  #cmd:focus{border-color:var(--accent);box-shadow:0 0 12px rgba(199,162,74,.15)}
  .hint{color:var(--dim);font-size:.75rem;margin-top:.3rem}
  .l-sys{color:var(--dim)} .l-say{color:var(--fg)} .l-npc{color:var(--accent)}
  .l-think{color:var(--magenta);font-style:italic} .l-enter{color:var(--green)}
  .l-leave{color:var(--dim)} .l-combat{color:var(--blue)} .l-err{color:var(--red)}
  .l-win{color:var(--green);font-weight:bold} .l-lose{color:var(--red);font-weight:bold}
  /* ─── Auth / character gate ─── */
  #gate{position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:1rem;z-index:10;padding:1rem;
        background:radial-gradient(circle at 50% 38%, #17130c 0%, #0a0908 60%, #050403 100%)}
  #gate h1{color:var(--accent);letter-spacing:.34em;text-indent:.34em;margin:0;
           font-family:var(--serif);font-weight:600;font-size:2.2rem;
           filter:drop-shadow(0 0 18px rgba(199,162,74,.18))}
  #gate .sub{color:var(--dim);font-size:.9rem;text-align:center;font-family:var(--serif);letter-spacing:.04em}
  #gate input{background:rgba(199,162,74,.04);border:1px solid var(--gold-dim);color:var(--fg);padding:.6rem 1rem;border-radius:3px;font:inherit;width:260px}
  #gate input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 12px rgba(199,162,74,.15)}
  #gate button.primary{background:var(--accent);color:#0a0908;border:0;padding:.6rem 1.5rem;border-radius:3px;font:inherit;font-weight:bold;letter-spacing:.06em;cursor:pointer;transition:box-shadow .25s ease}
  #gate button.primary:hover{box-shadow:0 0 22px rgba(199,162,74,.4)}
  #gate button.ghost{background:rgba(199,162,74,.04);color:var(--dim);border:1px solid var(--gold-dim);padding:.6rem 1.5rem;border-radius:3px;font:inherit;cursor:pointer}
  #gate button.ghost:hover{color:var(--accent);border-color:var(--accent)}
  .row{display:flex;gap:.5rem;align-items:center}
  .gerr{color:var(--red);min-height:1.2rem;font-size:.85rem;text-align:center}
  .tabs{display:flex;gap:1rem;margin-bottom:.25rem;justify-content:center}
  .tab{cursor:pointer;color:var(--dim);padding-bottom:.2rem;border-bottom:2px solid transparent;font-family:var(--serif);letter-spacing:.08em}
  .tab.active{color:var(--accent);border-color:var(--accent)}
  .charlist{display:flex;flex-direction:column;gap:.4rem;width:260px;max-height:40vh;overflow-y:auto}
  .charlist .charbtn{display:flex;justify-content:space-between;align-items:center;background:rgba(199,162,74,.05);border:1px solid var(--gold-dim);color:var(--fg);
        border-radius:3px;padding:.5rem .75rem;cursor:pointer;font:inherit}
  .charlist .charbtn:hover{border-color:var(--accent)}
  .charlist .charbtn .meta{color:var(--dim);font-size:.8rem}
  .hidden{display:none !important}
</style>
</head>
<body>
<div id="gate">
  <h1>BGID</h1>

  <!-- Screen 1: login / register -->
  <div id="screen-auth">
    <div class="tabs">
      <span class="tab active" id="tab-login">Log in</span>
      <span class="tab" id="tab-register">Register</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:.5rem;align-items:center">
      <input id="au-user" placeholder="username" maxlength="50" autocomplete="username" autofocus>
      <input id="au-pass" type="password" placeholder="password" autocomplete="current-password">
      <div class="row">
        <button class="primary" id="au-submit">Log in</button>
      </div>
      <div class="sub" id="au-hint"><strong>Password requirements:</strong> at least 8 characters, including a letter and a number.</div>
      <div class="gerr" id="au-err"></div>
    </div>
  </div>

  <!-- Screen 2: character select -->
  <div id="screen-chars" class="hidden">
    <div class="sub" id="char-greet"></div>
    <div class="charlist" id="charlist"></div>
    <div class="row">
      <input id="newchar" placeholder="new character name" maxlength="100">
      <button class="primary" id="newchar-btn">Create</button>
    </div>
    <div class="gerr" id="char-err"></div>
    <button class="ghost" id="char-logout">Log out</button>
  </div>
</div>

<header><b>BGID</b><span id="who"></span></header>
<main>
  <div id="world">
    <div id="map"></div>
    <div id="under">
      <div id="combat"></div>
      <div id="panel">
        <h1 id="zone">—</h1>
        <h2>You</h2>
        <div class="hpbar"><i id="hpfill" style="width:100%"></i></div>
        <div class="hptext" id="hptext">—</div>
        <h2>Here</h2><div id="here"></div>
      </div>
    </div>
  </div>
  <div id="side">
    <h2>Dialogue</h2>
  </div>
</main>
<footer>
  <input id="cmd" placeholder="say hi · talk innkeeper hello · look · help  (move with WASD / arrows)" autocomplete="off">
  <div class="hint">Move: WASD or arrow keys · Bump a foe to attack</div>
</footer>

<script>
const FOV_RADIUS = 8;
const S = {pid:null, name:null, ws:null, user:null,
           room:null, tiles:null, w:0, h:0, you:null, entities:{}, explored:{}};
const $ = s => document.querySelector(s);
const combatEl = $('#combat');
const sideEl = $('#side');

// ─── Token storage ───
const TOK = {
  get access(){ return localStorage.getItem('bgid_access'); },
  get refresh(){ return localStorage.getItem('bgid_refresh'); },
  set(t){ localStorage.setItem('bgid_access', t.access_token); localStorage.setItem('bgid_refresh', t.refresh_token); },
  clear(){ localStorage.removeItem('bgid_access'); localStorage.removeItem('bgid_refresh'); },
};

// Authenticated fetch with one transparent refresh-on-401 retry.
async function api(path, {method='GET', body=null, retry=true}={}){
  const headers = {'Content-Type':'application/json'};
  if(TOK.access) headers['Authorization'] = 'Bearer ' + TOK.access;
  const r = await fetch(path, {method, headers, body: body?JSON.stringify(body):null});
  if(r.status===401 && retry && TOK.refresh){
    const ok = await tryRefresh();
    if(ok) return api(path, {method, body, retry:false});
  }
  return r;
}
async function tryRefresh(){
  try{
    const r = await fetch('/auth/refresh', {method:'POST', headers:{'Content-Type':'application/json'},
                          body:JSON.stringify({refresh_token: TOK.refresh})});
    if(!r.ok){ TOK.clear(); return false; }
    TOK.set(await r.json());
    return true;
  }catch(_){ return false; }
}

// ─── Logging: combat strip (Layer 1) vs dialogue sidebar (Layer 2) ───
function logCombat(msg, cls='l-sys'){
  const d = document.createElement('div'); d.className = cls; d.textContent = msg;
  combatEl.appendChild(d); combatEl.scrollTop = combatEl.scrollHeight;
}
function logSide(msg, cls='l-say'){
  const d = document.createElement('div'); d.className = cls; d.textContent = msg;
  sideEl.appendChild(d); sideEl.scrollTop = sideEl.scrollHeight;
}
function send(obj){ if(S.ws && S.ws.readyState===1) S.ws.send(JSON.stringify(obj)); }

// ─── Tile renderer — vector 2D canvas: continuous double-line walls and
//     single-line doors, traced from the floor boundary (so any room SHAPE
//     works, not just rectangles). rot.js is kept only for FOV math. ───
let cv = null, ctx = null, cell = 16;
const MAP_BG    = '#100c07';                          // aged dark vellum
const WALL_VIS  = '#d8ccab', WALL_MEM = '#574b2c';    // double-line walls (ink)
const DOOR_VIS  = '#e6bd5e', DOOR_MEM = '#6e5a2c';    // single-line doorways (gold)
const FLOOR_DOT = '#2b2616';                          // faint floor stipple

function inBounds(x,y){ return y>=0 && y<S.h && S.tiles[y] && x>=0 && x<S.tiles[y].length; }
function tileAt(x,y){ return inBounds(x,y) ? S.tiles[y][x] : '#'; }  // off-grid = wall (FOV)
function isFloor(x,y){ return inBounds(x,y) && S.tiles[y][x] === '.'; }
function isDoor(x,y){ return inBounds(x,y) && S.tiles[y][x] === '+'; }
function isTransparent(x,y){ return tileAt(x,y) !== '#'; }           // doors see-through

function rebuildDisplay(){
  if(!cv){ cv = document.createElement('canvas'); $('#map').appendChild(cv); ctx = cv.getContext('2d'); }
  if(!S.w || !S.h) return;
  const area = $('#map').getBoundingClientRect();
  cell = Math.max(14, Math.floor(Math.min((area.width - 24) / S.w, (area.height - 24) / S.h)));
  const dpr = window.devicePixelRatio || 1;
  cv.width = S.w * cell * dpr; cv.height = S.h * cell * dpr;
  cv.style.width = (S.w * cell) + 'px'; cv.style.height = (S.h * cell) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function _line(ax, ay, bx, by, color, w){
  ctx.strokeStyle = color; ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
}

// One edge of a floor cell. nx,ny = the cell across this edge; a..b = the edge
// endpoints (pre-extended for clean corners). Floor neighbour → nothing; door →
// single line; wall/void → double line straddling the boundary.
function edge(nx, ny, ax, ay, bx, by, wallC, doorC, lw, d, orient){
  if(isFloor(nx, ny)) return;
  if(isDoor(nx, ny)){ _line(ax, ay, bx, by, doorC, Math.max(1.2, lw * 0.85)); return; }
  if(orient === 'h'){ _line(ax, ay - d, bx, by - d, wallC, lw); _line(ax, ay + d, bx, by + d, wallC, lw); }
  else             { _line(ax - d, ay, bx - d, by, wallC, lw); _line(ax + d, ay, bx + d, by, wallC, lw); }
}

function draw(){
  if(!ctx || !S.you) return;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = MAP_BG; ctx.fillRect(0, 0, S.w * cell, S.h * cell);

  // Field of view from the player; remember everything ever seen.
  const visible = {};
  try{
    const fov = new ROT.FOV.PreciseShadowcasting(isTransparent);
    fov.compute(S.you.x, S.you.y, FOV_RADIUS, (x,y)=>{ visible[x+','+y]=true; S.explored[x+','+y]=true; });
  }catch(_){ /* player off-grid mid-update; skip this frame */ }

  const lw = Math.max(1.5, cell * 0.07);   // line weight
  const d  = Math.max(2, cell * 0.11);     // half-gap between the two wall lines
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // Trace walls from the boundary of every visible/remembered floor cell.
  for(let y=0;y<S.h;y++){
    const row = S.tiles[y] || '';
    for(let x=0;x<row.length;x++){
      if(!isFloor(x,y)) continue;
      const k = x+','+y, vis = visible[k];
      if(!vis && !S.explored[k]) continue;
      const px = x*cell, py = y*cell;
      if(vis){ ctx.fillStyle = FLOOR_DOT; ctx.beginPath();
               ctx.arc(px+cell/2, py+cell/2, Math.max(.6, cell*0.035), 0, 7); ctx.fill(); }
      const wc = vis ? WALL_VIS : WALL_MEM, dc = vis ? DOOR_VIS : DOOR_MEM;
      edge(x,   y-1, px-d,    py,      px+cell+d, py,      wc, dc, lw, d, 'h');  // N
      edge(x,   y+1, px-d,    py+cell, px+cell+d, py+cell, wc, dc, lw, d, 'h');  // S
      edge(x-1, y,   px,      py-d,    px,        py+cell+d, wc, dc, lw, d, 'v'); // W
      edge(x+1, y,   px+cell, py-d,    px+cell,   py+cell+d, wc, dc, lw, d, 'v'); // E
    }
  }

  // Entities (emoji), in view only; the player is always drawn (FOV origin).
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = Math.floor(cell * 0.72) + 'px ui-monospace, Menlo, monospace';
  for(const id in S.entities){
    const e = S.entities[id];
    if(visible[e.x+','+e.y]) ctx.fillText(e.glyph || '?', e.x*cell + cell/2, e.y*cell + cell/2 + 1);
  }
  ctx.fillText(S.you.glyph || '🧙', S.you.x*cell + cell/2, S.you.y*cell + cell/2 + 1);
}

function setHp(hp, max){
  if(hp==null || max==null) return;
  $('#hpfill').style.width = Math.max(0, Math.round(100*hp/max)) + '%';
  $('#hptext').textContent = `${hp} / ${max} HP`;
}

function renderPanel(){
  $('#zone').textContent = S.room ? S.room.name : '—';
  if(S.you) setHp(S.you.hp, S.you.max_hp);
  const here = $('#here'); here.innerHTML='';
  const ids = Object.keys(S.entities);
  let any=false;
  ids.forEach(id=>{
    const e = S.entities[id];
    const row = document.createElement('div'); row.className='ent';
    const color = e.kind==='player' ? 'var(--green)' : (e.hostile ? 'var(--red)' : 'var(--accent)');
    row.innerHTML = `<span class="nm" style="color:${color}">${e.glyph||''} ${e.name}</span>`;
    if(e.kind==='npc'){
      const t = document.createElement('button'); t.textContent='talk';
      t.onclick=()=>{ $('#cmd').value = `talk ${e.name} `; $('#cmd').focus(); };
      row.appendChild(t);
      const a = document.createElement('button'); a.textContent='attack';
      a.onclick=()=> send({cmd:'attack', target_id:e.id});
      row.appendChild(a);
    }
    here.appendChild(row); any=true;
  });
  if(!any) here.innerHTML='<span style="color:var(--dim)">no one else</span>';
}

// ─── Event handling ───
function onEvent(m){
  switch(m.event){
    case 'zone_state':
      S.room=m.room; S.you=m.you; S.entities={}; S.explored={};
      S.tiles=m.tiles.grid; S.w=m.tiles.w; S.h=m.tiles.h;
      (m.entities||[]).forEach(e=> S.entities[e.id]=e);
      rebuildDisplay(); draw(); renderPanel();
      logCombat(`— ${m.room?m.room.name:''} —`, 'l-sys');
      break;
    case 'entity_moved':
      if(S.you && m.id===S.you.id){ S.you.x=m.x; S.you.y=m.y; }
      else if(S.entities[m.id]){ S.entities[m.id].x=m.x; S.entities[m.id].y=m.y; }
      draw();
      break;
    case 'entity_spawned':
      if(!(S.you && m.id===S.you.id)){
        S.entities[m.id] = {id:m.id, kind:m.kind, name:m.name, glyph:m.glyph, x:m.x, y:m.y, hostile:m.hostile};
        if(m.kind==='player') logSide(`${m.name} arrives.`, 'l-enter');
        else if(m.hostile) logCombat(`${m.name} appears!`, 'l-combat');
        draw(); renderPanel();
      }
      break;
    case 'entity_died':
      if(S.entities[m.id]){ delete S.entities[m.id]; draw(); renderPanel(); }
      logCombat(`${m.name} is slain${m.by?(' by '+m.by):''}!`, 'l-win');
      break;
    case 'entity_left':
      if(S.entities[m.id]){ delete S.entities[m.id]; draw(); renderPanel(); }
      logSide(`${m.name||'Someone'} leaves.`, 'l-leave');
      break;
    case 'combat': {
      const who=m.attacker, tgt=m.target;
      if(m.hit) logCombat(`${who} hits ${tgt} for ${m.damage} (${tgt} ${m.target_hp}/${m.target_max_hp}).`, 'l-combat');
      else logCombat(`${who} misses ${tgt}.`, 'l-combat');
      if(S.you && m.target_id===S.you.id){ S.you.hp=m.target_hp; setHp(m.target_hp, m.target_max_hp); }
      break; }
    case 'player_defeated': logCombat(`${m.name} has fallen!`, 'l-lose'); break;
    case 'respawn': logCombat(`You respawn (HP ${m.health}).`, 'l-sys'); break;
    // ─── Layer 2 (dialogue sidebar) ───
    case 'chat': logSide(`${m.from}: ${m.text}`, 'l-say'); break;
    case 'npc_thinking': logSide(`${m.name} is thinking…`, 'l-think'); break;
    case 'npc_said': logSide(`${m.name}: ${m.text}`, 'l-npc'); break;
    case 'error': logCombat(m.detail, 'l-err'); break;
    default: logCombat(JSON.stringify(m), 'l-sys');
  }
}

// ─── Movement input (WASD / arrows) ───
const MOVE = {
  ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
  w:[0,-1], s:[0,1], a:[-1,0], d:[1,0], W:[0,-1], S:[0,1], A:[-1,0], D:[1,0],
};
window.addEventListener('keydown', e=>{
  // Never hijack keys while typing in a field (login, character name, command
  // box, …) — only move when focus is on the page body.
  const ae = document.activeElement;
  if(ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable)) return;
  const m = MOVE[e.key];
  if(m){ e.preventDefault(); send({cmd:'move', dx:m[0], dy:m[1]}); }
});
window.addEventListener('resize', ()=>{ rebuildDisplay(); draw(); });

// ─── Command box (Layer-2 verbs) ───
function npcByName(name){
  const q = (name||'').toLowerCase();
  return Object.values(S.entities).find(e => e.kind==='npc' && e.name.toLowerCase().startsWith(q));
}
function handleCommand(raw){
  const text = raw.trim(); if(!text) return;
  const parts = text.split(/\s+/); const verb = parts[0].toLowerCase();
  if(verb==='look' || verb==='l'){ send({cmd:'look'}); return; }
  if(verb==='help' || verb==='?'){
    logCombat('Move with WASD/arrows (bump a foe to attack). Commands: say <text> · talk <npc> <text> · attack <npc> · look', 'l-sys'); return; }
  if(verb==='say'){ send({cmd:'say', text:parts.slice(1).join(' ')}); return; }
  if(verb==='talk'){
    const npc = npcByName(parts[1]||''); if(!npc){ logCombat(`No NPC like "${parts[1]||''}" here.`,'l-err'); return; }
    send({cmd:'talk', npc_id:npc.id, text:parts.slice(2).join(' ') || 'hello'}); return; }
  if(verb==='attack'){
    const npc = npcByName(parts[1]||''); if(!npc){ logCombat(`No NPC like "${parts[1]||''}" here.`,'l-err'); return; }
    send({cmd:'attack', target_id:npc.id}); return; }
  send({cmd:'say', text:text});
}
$('#cmd').addEventListener('keydown', e=>{ if(e.key==='Enter'){ handleCommand(e.target.value); e.target.value=''; }});

// ─── WebSocket (token-authenticated) ───
let _wsRetried = false;
function connect(){
  const proto = location.protocol==='https:' ? 'wss' : 'ws';
  S.ws = new WebSocket(`${proto}://${location.host}/ws/${S.pid}?token=${encodeURIComponent(TOK.access)}`);
  S.ws.onopen = ()=> { _wsRetried = false; logCombat('Connected.', 'l-enter'); };
  S.ws.onmessage = ev => { try{ onEvent(JSON.parse(ev.data)); }catch(_){ logCombat(ev.data,'l-sys'); } };
  S.ws.onclose = async (ev)=>{
    // 4401 = token expired/invalid: refresh once and reconnect transparently.
    if(ev.code===4401 && !_wsRetried && TOK.refresh){
      _wsRetried = true;
      if(await tryRefresh()){ connect(); return; }
    }
    logCombat('Disconnected.', 'l-err');
  };
  S.ws.onerror = ()=> logCombat('Connection error.', 'l-err');
}

// ─── Gate: auth + character flows ───
let authMode = 'login';
function setMode(m){
  authMode = m;
  $('#tab-login').classList.toggle('active', m==='login');
  $('#tab-register').classList.toggle('active', m==='register');
  $('#au-submit').textContent = m==='login' ? 'Log in' : 'Register';
  $('#au-hint').style.visibility = m==='register' ? 'visible' : 'hidden';
  $('#au-pass').autocomplete = m==='login' ? 'current-password' : 'new-password';
  $('#au-err').textContent = '';
}
$('#tab-login').onclick = ()=> setMode('login');
$('#tab-register').onclick = ()=> setMode('register');

async function submitAuth(){
  const username = $('#au-user').value.trim();
  const password = $('#au-pass').value;
  if(!username || !password){ $('#au-err').textContent = 'Enter a username and password.'; return; }
  const path = authMode==='login' ? '/auth/login' : '/auth/register';
  try{
    const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'},
                                 body:JSON.stringify({username, password})});
    const data = await r.json().catch(()=>({}));
    if(!r.ok){
      $('#au-err').textContent = humanError(data) || ('Error ' + r.status);
      return;
    }
    TOK.set(data.tokens);
    S.user = data.user;
    showCharacters();
  }catch(_){ $('#au-err').textContent = 'Could not reach the server.'; }
}
function humanError(data){
  if(!data) return '';
  if(typeof data.detail === 'string') return data.detail;
  if(Array.isArray(data.detail) && data.detail[0]) return data.detail[0].msg; // pydantic 422
  return data.error || '';
}
$('#au-submit').onclick = submitAuth;
$('#au-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAuth(); });
$('#au-user').addEventListener('keydown', e=>{ if(e.key==='Enter') $('#au-pass').focus(); });

async function showCharacters(){
  $('#screen-auth').classList.add('hidden');
  $('#screen-chars').classList.remove('hidden');
  $('#char-greet').textContent = `Signed in as ${S.user.username}. Choose a character:`;
  await refreshCharacters();
  $('#newchar').focus();
}
async function refreshCharacters(){
  const r = await api('/characters');
  const list = $('#charlist'); list.innerHTML = '';
  if(!r.ok){ $('#char-err').textContent = 'Could not load characters.'; return; }
  const chars = await r.json();
  if(!chars.length){ list.innerHTML = '<div class="sub">No characters yet — create one below.</div>'; }
  chars.forEach(c=>{
    const b = document.createElement('button'); b.className='charbtn';
    b.innerHTML = `<span>${c.name}</span><span class="meta">lvl ${c.level} · ${c.health}/${c.max_health} hp</span>`;
    b.onclick = ()=> playAs(c);
    list.appendChild(b);
  });
}
async function createCharacter(){
  const name = $('#newchar').value.trim();
  if(!name){ $('#char-err').textContent = 'Enter a character name.'; return; }
  const r = await api('/characters', {method:'POST', body:{name}});
  const data = await r.json().catch(()=>({}));
  if(!r.ok){ $('#char-err').textContent = humanError(data) || ('Error ' + r.status); return; }
  $('#newchar').value=''; $('#char-err').textContent='';
  playAs(data);
}
$('#newchar-btn').onclick = createCharacter;
$('#newchar').addEventListener('keydown', e=>{ if(e.key==='Enter') createCharacter(); });

function playAs(ch){
  S.pid = ch.id; S.name = ch.name;
  $('#who').innerHTML = `${ch.name} (#${ch.id}) · ${S.user.username} <a id="logout">log out</a>`;
  $('#logout').onclick = logout;
  $('#gate').style.display = 'none';
  connect();
}
function logout(){
  try{ if(TOK.refresh) fetch('/auth/logout', {method:'POST', headers:{'Content-Type':'application/json',
        'Authorization':'Bearer '+TOK.access}, body:JSON.stringify({refresh_token:TOK.refresh})}); }catch(_){}
  TOK.clear();
  if(S.ws) try{ S.ws.close(); }catch(_){}
  location.reload();
}
function char_logout(){ TOK.clear(); location.reload(); }
$('#char-logout').onclick = char_logout;

// ─── Boot: rehydrate an existing session ───
(async function boot(){
  setMode('login');
  if(TOK.access){
    const r = await api('/auth/me');
    if(r.ok){ const me = await r.json(); S.user = me.user; showCharacters(); return; }
    TOK.clear();
  }
})();
</script>
</body>
</html>
