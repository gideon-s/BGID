# BGID nginx site config.
# Install: copy to /etc/nginx/sites-available/bgid, symlink into sites-enabled,
#          `nginx -t && systemctl reload nginx`, then run certbot for TLS.
#
# Replace YOURDOMAIN below with your domain (e.g. phobophilia.com).

# Maps the Upgrade header so WebSocket connections proxy correctly.
# (Allowed in the http context; sites-available files are included there.)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN www.YOURDOMAIN;
    # After `certbot --nginx`, certbot adds the listen 443 ssl block and an
    # http->https redirect here automatically.

    # The whole app (web client at /, REST, and /ws WebSocket) is one origin.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (for /ws/{player_id})
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep long-lived WebSocket connections from timing out
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
